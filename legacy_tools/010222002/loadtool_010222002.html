				canvas.style.width = canvasWidth + 'px';
				canvas.style.height = canvasHeight + 'px';
				canvas.width = Math.round(canvasWidth* screenRatio);
				canvas.height = Math.round(canvasHeight * screenRatio);

				c.fillStyle = dcolor;

				c.strokeRect(0, 0, canvasWidth* screenRatio, canvasWidth* screenRatio);
				return canvas;
