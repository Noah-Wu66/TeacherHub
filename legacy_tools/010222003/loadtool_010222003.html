			function dyeColor(type){
				if(type == 1){//正面
					fontFlag = !fontFlag;
					if(fontFlag){
						$('#btn1').css({
							"background-image": 'url("/images/img/010222003/szhck.png")'
						})
					}else{
						$('#btn1').css({
							"background-image": 'url("/images/img/010222003/zck.png")'
						})
					}
		
					
				}else if(type == 2){ //右面面
					lrFlag = !lrFlag;
					if(lrFlag){
						$('#btn2').css({
							"background-image": 'url("/images/img/010222003/srck.png")'
						})
					}else{
						$('#btn2').css({
							"background-image": 'url("/images/img/010222003/rck.png")'
						})
					}

				}else if(type == 3){ //上面
					upFlag = !upFlag;
					if(upFlag){
						$('#btn3').css({
							"background-image": 'url("/images/img/010222003/suck.png")'
						})
					}else{
						$('#btn3').css({
							"background-image": 'url("/images/img/010222003/uck.png")'
						})
					}
				}
				
				var fontColor = bluematerial;
				var upColor = bluematerial;
				var leftColor = bluematerial;
				if(upFlag){
					upColor = greenmaterial;
					$('#up_div').find('.rightAnswerTd').css("background-color","#66cc66");
				}else{
					$('#up_div').find('.rightAnswerTd').css("background-color","#7888ff");
				}

				if(lrFlag){
					leftColor = yellowmaterial;
					$('#left_div').find('.rightAnswerTd').css("background-color","#ffcc00");
				}else{
					$('#left_div').find('.rightAnswerTd').css("background-color","#7888ff");
				}

				if(fontFlag){
					fontColor = redmaterial;
					$('#font_div').find('.rightAnswerTd').css("background-color","#ff0000");
				}else{
					$('#font_div').find('.rightAnswerTd').css("background-color","#7888ff");
				}
				materialArray = [leftColor,bluematerial,upColor,bluematerial,fontColor,bluematerial]
				for(var i = 0; i<objects.length;i++){
					if(objects[i].name != "plane"){
						objects[i].material = materialArray;
					}
				}
			}
			
			function canvastexture(dcolor){
				var canvas = document.createElement("canvas");

				var c = canvas.getContext('2d');
				var screenRatio = getPixelRatio(c);

				var canvasWidth = 128
				var canvasHeight = 128;

				canvas.style.width = canvasWidth + 'px';
				canvas.style.height = canvasHeight + 'px';
				canvas.width = Math.round(canvasWidth* screenRatio);
				canvas.height = Math.round(canvasHeight * screenRatio);

				// 矩形区域填充背景
				c.beginPath();
				c.fillStyle = dcolor;
				
				c.fillRect(0, 0, canvasWidth* screenRatio, canvasWidth* screenRatio);
				c.lineWidth = 6* screenRatio;
				c.strokeRect(0, 0, canvasWidth* screenRatio, canvasWidth* screenRatio);
				return canvas;
			}
